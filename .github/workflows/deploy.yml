name: Build & Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.DOCKER_REGISTRY_PASSWORD }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      sha_tag: ghcr.io/${{ github.repository }}:${{ github.sha }}
      latest_tag: ghcr.io/${{ github.repository }}:latest

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build.outputs.sha_tag }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_SSH_USER: ${{ secrets.SERVER_SSH_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT || '22' }}
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Pull and package image
        run: |
          set -euo pipefail
          docker pull "$IMAGE_TAG"
          docker save "$IMAGE_TAG" | gzip -1 > /tmp/open-design-image.tar.gz

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/open_design_deploy_key
          chmod 600 ~/.ssh/open_design_deploy_key
          ssh-keyscan -p "$SERVER_SSH_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload image to server
        run: |
          set -euo pipefail
          scp -P "$SERVER_SSH_PORT" \
            -i ~/.ssh/open_design_deploy_key \
            /tmp/open-design-image.tar.gz \
            "$SERVER_SSH_USER@$SERVER_HOST:/tmp/open-design-image.tar.gz"

      - name: Deploy loaded image
        run: |
          set -euo pipefail
          ssh -p "$SERVER_SSH_PORT" \
            -i ~/.ssh/open_design_deploy_key \
            "$SERVER_SSH_USER@$SERVER_HOST" \
            "IMAGE_TAG='$IMAGE_TAG' bash -s" <<'REMOTE'
          set -euo pipefail
          APP_NAME=open-design
          NEXT_NAME=open-design-next
          APP_PORT=7456
          NEXT_PORT=7457
          NEXT_VOLUME=open-design-next-data

          docker load -i /tmp/open-design-image.tar.gz
          rm -f /tmp/open-design-image.tar.gz

          docker rm -f "$NEXT_NAME" 2>/dev/null || true
          docker volume rm "$NEXT_VOLUME" 2>/dev/null || true
          docker volume create "$NEXT_VOLUME" >/dev/null
          docker run -d \
            --name "$NEXT_NAME" \
            -p "$NEXT_PORT:7456" \
            -v "$NEXT_VOLUME:/app/.od" \
            -e NODE_ENV=production \
            -e OD_HOST=0.0.0.0 \
            -e OD_PORT=7456 \
            "$IMAGE_TAG"

          healthy=0
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:$NEXT_PORT/api/health"; then
              healthy=1
              break
            fi
            sleep 2
          done
          if [ "$healthy" -ne 1 ]; then
            echo "Open Design failed health check" >&2
            docker logs --tail 200 "$NEXT_NAME" >&2 || true
            docker rm -f "$NEXT_NAME" 2>/dev/null || true
            docker volume rm "$NEXT_VOLUME" 2>/dev/null || true
            exit 1
          fi
          echo "Daemon ready"

          docker rm -f "$APP_NAME" 2>/dev/null || true
          docker run -d \
            --name "$APP_NAME" \
            --restart unless-stopped \
            -p "$APP_PORT:7456" \
            -v od-data:/app/.od \
            -e NODE_ENV=production \
            -e OD_HOST=0.0.0.0 \
            -e OD_PORT=7456 \
            "$IMAGE_TAG"
          docker rm -f "$NEXT_NAME" 2>/dev/null || true
          docker volume rm "$NEXT_VOLUME" 2>/dev/null || true

          # Use the server's apt-installed nginx (avoids Docker Hub access from China)
          mkdir -p /tmp/od-deploy
          docker cp "$APP_NAME":/app/deploy/nginx/nginx.conf /tmp/od-deploy/nginx.conf
          sudo sed -i 's|/var/log/nginx/error.log|/tmp/od-deploy/nginx-error.log|g; s|/var/log/nginx/access.log|/tmp/od-deploy/nginx-access.log|g; s|/run/nginx.pid|/tmp/od-deploy/nginx.pid|g' /tmp/od-deploy/nginx.conf
          # Kill any process holding port 80 (nginx from previous deploy still bound after restart loop)
          sudo fuser -k 80/tcp 2>/dev/null || true
          sudo nginx -c /tmp/od-deploy/nginx.conf
          echo "Done"
          REMOTE
