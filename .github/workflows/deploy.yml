name: Build & Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      sha_tag: ghcr.io/${{ github.repository }}:${{ github.sha }}
      latest_tag: ghcr.io/${{ github.repository }}:latest

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build.outputs.sha_tag }}
      GHCR_USER: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          envs: IMAGE_TAG,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            # Login to GHCR so the server can pull the private image
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            echo "Pulling $IMAGE_TAG"
            docker pull "$IMAGE_TAG"
            docker rm -f open-design 2>/dev/null || true
            docker run -d \
              --name open-design \
              --restart unless-stopped \
              -p 7456:7456 \
              -v od-data:/app/.od \
              -e NODE_ENV=production \
              -e OD_PORT=7456 \
              -e OD_WEB_OUTPUT_MODE=server \
              "$IMAGE_TAG"
            for i in $(seq 1 30); do
              curl -sf http://127.0.0.1:7456/api/health && break
              sleep 2
            done
            echo "Daemon ready"
            # Use the server's apt-installed nginx (avoids Docker Hub access from China)
            mkdir -p /tmp/od-deploy
            docker cp open-design:/app/deploy/nginx/nginx.conf /tmp/od-deploy/nginx.conf
            sudo sed -i 's|/var/log/nginx/error.log|/tmp/od-deploy/nginx-error.log|g; s|/var/log/nginx/access.log|/tmp/od-deploy/nginx-access.log|g; s|/run/nginx.pid|/tmp/od-deploy/nginx.pid|g' /tmp/od-deploy/nginx.conf
            # Kill any process holding port 80 (nginx from previous deploy still bound after restart loop)
            sudo fuser -k 80/tcp 2>/dev/null || true
            sudo nginx -c /tmp/od-deploy/nginx.conf
            echo "Done"
