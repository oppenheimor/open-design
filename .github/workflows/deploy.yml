# ─────────────────────────────────────────────────────────────────────────────
# Open Design · GitHub Actions CI/CD
# Pushes a Docker image to GHCR and SSH-deploys it to the server.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   DOCKER_REGISTRY_PASSWORD   — a fine-grained PAT with
#                           write:packages scope for GHCR login
#   SERVER_HOST             — server IP or hostname
#   SERVER_SSH_KEY         — private key for logging into the server
#   SERVER_SSH_USER        — SSH username on the server (e.g. root)
# ─────────────────────────────────────────────────────────────────────────────
name: Build & Deploy to Server

on:
  push:
    branches: [main]

  # Manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag override (default: commit SHA short)
        required: false

env:
  REGISTRY: ghcr.io
  REGISTRY_REPO: ${{ github.repository }}
  IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.REGISTRY_REPO }}
  SERVER_IP: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_SSH_USER }}

jobs:
  # ── Job 1: Build & Push ─────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

  # ── Job 2: Deploy ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://${{ secrets.SERVER_HOST }}
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
    steps:
      - name: Deploy image to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            echo "Pulling $IMAGE_TAG …"
            docker pull "$IMAGE_TAG"

            # ── Stop / remove old containers ──────────────────────────────────
            docker rm -f open-design 2>/dev/null || true

            # ── Start open-design container ───────────────────────────────────
            docker run -d \
              --name open-design \
              --restart unless-stopped \
              -p 7456:7456 \
              -v od-data:/app/.od \
              -e NODE_ENV=production \
              -e OD_PORT=7456 \
              -e OD_WEB_OUTPUT_MODE=server \
              "$IMAGE_TAG"

            # ── Health poll ───────────────────────────────────────────────────
            for i in $(seq 1 30); do
              curl -sf http://127.0.0.1:7456/api/health && break
              echo "Waiting … $i/30"
              sleep 2
            done
            echo "✓ Daemon healthy"

            # ── Nginx ────────────────────────────────────────────────────────
            # nginx.conf lives at /app/deploy/nginx/nginx.conf inside the image.
            # Copy it to the host so the nginx container can mount it.
            mkdir -p /tmp/open-design-deploy
            docker cp open-design:/app/deploy/nginx/nginx.conf /tmp/open-design-deploy/nginx.conf
            docker rm -f nginx 2>/dev/null || true
            docker run -d \
              --name nginx \
              --restart unless-stopped \
              -p 80:80 \
              -p 443:443 \
              -v /tmp/open-design-deploy/nginx.conf:/etc/nginx/nginx.conf:ro \
              nginx:alpine
            echo "✓ Nginx started"

            echo "DEPLOY_DONE"