# ── Nginx config for Open Design (SSR mode, self-signed cert)
# ┌─────────────────────────────────────────────────────────────────┐
# │  Generate self-signed cert before starting Nginx:                 │
# │                                                                  │
# │  openssl req -x509 -nodes -days 365 \                           │
# │    -newkey rsa:2048 -keyout /etc/ssl/private/od.key \          │
# │    -out    /etc/ssl/certs/od.crt \                            │
# │    -subj   "/C=CN/ST=SH/L=Shanghai/O=OpenDesign/CN=43.137.38.67"│
# │                                                                  │
# │  Or generate a DH param (stronger, but takes a few seconds):        │
# │  openssl dhparam -out /etc/ssl/dhparam.pem 2048                   │
# └─────────────────────────────────────────────────────────────────┘
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;
events {
    worker_connections 1024;
    use epoll;
}
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Gzip (off for SSE streams — buffering them causes               ─────────────────
    #   net::ERR_INCOMPLETE_CHUNKED_ENCODING after ~80-90 s)              ───
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml application/json application/javascript
              application/xml application/atom+xml image/svg+xml;

    # ── Upstream ────────────────────────────────────────────────────────────────
    upstream od-app {
        server 127.0.0.1:7456;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect (no https on 43.137.38.67 yet) ──────────────────
    #   Uncomment when you have a real cert (Let's Encrypt / purchased).
    #   Also remove the listen 443 server{} block below if you only want HTTPS.
    # server {
    #     listen 80;
    #     server_name 43.137.38.67;
    #     return 301 https://$host$request_uri;
    # }

    # ── HTTP server (plain, self-signed HTTPS) ────────────────────────────
    server {
        listen 80;
        # listen 443 ssl http2;   # uncomment when you have a real cert
        server_name 43.137.38.67;

        # Self-signed cert paths — comment out when using a real cert
        # ssl_certificate /etc/ssl/certs/od.crt;
        # ssl_certificate_key /etc/ssl/private/od.key;
        # ssl_dhparam /etc/ssl/dhparam.pem;   # optional

        # ── Request / response limits ─────────────────────────────────────────
        client_max_body_size 50m;
        client_body_timeout 300s;
        proxy_read_timeout 86400s;   # must match for SSE
        proxy_send_timeout 86400s;

        # ── Locations ────────────────────────────────────────────────────────
        location / {
            proxy_pass http://od-app;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
        }

        # ── SSE / streaming routes ─────────────────────────────────────────
        #    CRITICAL: buffer off + gzip off + long timeouts
        location ~ ^/(api/chat|api/stream|api/proxy/stream|api/chat2) {
            proxy_pass http://od-app;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            gzip off;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Tell daemon Nginx is handling this connection so it can emit
            # X-Accel-Buffering: no if needed
            proxy_set_header X-Accel-Buffering no;
        }

        # Static assets can be cached
        location ~ ^/(artifacts|frames|_next) {
            proxy_pass http://od-app;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_bypass $arg_no_cache;

            proxy_buffering off;
            gzip off;
            proxy_read_timeout 120s;
        }
    }
}
